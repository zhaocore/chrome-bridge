<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome Bridge</title>
  </head>
  <body>
    <main id="app">
      <header>
        <h1>Chrome Bridge</h1>
        <p id="status">检测中...</p>
      </header>

      <label>
        Daemon WebSocket 地址
        <input id="server-url" spellcheck="false" />
      </label>

      <p class="warning">
        连接后，本地服务可以读取页面、点击、输入、截图和操作标签页。只连接你信任的服务。
      </p>

      <div class="actions">
        <button id="test">测试</button>
        <button id="connect">连接</button>
        <button id="disconnect">断开</button>
      </div>

      <pre id="detail"></pre>
    </main>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
